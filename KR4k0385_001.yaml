body:
  text: 裴景仁秦記苻洪之先居武都家生蒲長五丈節狀如竹咸以異之謂之蒲家因以氏焉洪後以讖文草付應王遂改姓為苻類聚八十二御覽九百九十九苻健至長安賈玄等上尊號依舊儀立百官設壇城南於渭水之陽初學記六引作裴景仁秦書書鈔百五十八引作苻書苻健皇始元年晉梁州刺史司馬勳入秦州獲尚書趙琨殺而棄其尸琨子煥求父尸不得乃悲號不已俄有群鳥悲鳴從山而來來而復反尋鳥向山乃得父尸御覽四百十一苻健皇始四年新平縣有長人見語百姓張靖曰苻氏應天受命今當太平新平令以聞健以為妖妄下靖獄是月會大雨霖河渭溢蒲坂津監寇登於河中得隻屐長七尺二寸稱履五指長尺餘指尺深一寸登以獻健嘆曰覆載之中何所不有張靖所見定不虛也因赦靖書鈔百三十六御覽六百九十八苻健皇始四年冬山雞來入人家栖宿養子而去群聚傍渭水而遊翔與家雞無異初學記六書鈔百五十八苻健皇始五年鳳皇降渭濱杜陵南原三日而去御覽五十七苻堅祖洪見堅狀貌欲令頭堅腹軟字之曰堅頭類聚十七御覽三百六十四苻堅幸太學問博士經典博士盧壼對曰周官禮注未有其師永固堅字以太常韋逞母宋氏傳其父業得周官音義自非此母無可授後堅於是就宋立溝室書堂生徒百二十人隔絳紗幔而授業焉拜宋爵號宣文君賜侍婢十人初學記十八御覽四百四按二書皆引作裴景仁前秦記類聚六十九引作秦記書鈔百三十二苻堅討姚萇於北地斷其運水之路人有渴死者俄而降雨於萇營營中水深三尺周營百步之外寸餘而已於是萇軍大振堅方風撫盤而詬曰天其無心何故降澤賊營初長安謠云鳳皇鳳皇止何房苻堅遂於阿房城植桐數萬株以待之其後慕容沖入阿房城而止焉沖小字鳳皇類聚八十八事類賦注二十五御覽九百五十六按此皆引作秦記謝玄進據彭城淮陰太守高素伐青州朗為表州降苻朗字元達堅從兄性宏放神氣爽悟堅常曰吾家千里駒也堅為慕容沖所圍朗降謝玄用為員外散騎侍郎吏部郎王忱與兄國寶命駕詣之沙門法汰問朗曰見王吏部兄弟未朗曰非一狗面人心又一人面狗心者是耶忱醜而才國寶美而狠故也苻朗渡江嘗與朝士宴集時賢並用唾壼朗欲夸之唾則令小兒跪而張口就唾而含出坐者以為不及之遠矣又善識味會稽王道子為設精饌訖問關中之食孰若於此朗曰皆好唯鹽味小生即問宰夫如其言或人殺雞以食之朗曰此雞棲恆半露問之亦驗又食鵝炙知白黑之處人不信既而咸試而記之果然無毫釐之差著苻子數十篇蓋老莊之流也朗矜高忤物不容於世後眾讒而殺之世說注七姚萇圍苻堅遣僕射尹緯詣闕陳事堅見緯貌魁梧志氣秀傑腰帶十圍瑰偉異常驚而問曰卿於朕世何所為作緯答曰尚書令史堅笑曰卿宰相才也御覽三百七十七呂光破龜茲始獲鳩摩羅什光死子纘立戲弄鳩摩羅什或共碁博及殺子云斫胡奴頭什曰不斫胡奴頭其胡奴斫人頭後纘弟越字胡奴果斫纘頭御覽七百五十四
